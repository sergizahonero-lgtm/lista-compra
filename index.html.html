<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🛒 Nuestra Lista</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --card: #ffffff; --primary: #e8533a; --primary-light: #fde8e4;
    --accent: #2d5a3d; --accent-light: #e4efe7; --text: #1a1a1a; --muted: #999;
    --border: #ece9e3; --shadow: 0 2px 16px rgba(0,0,0,0.08); --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 120px; }

  .header { background: var(--primary); padding: 52px 20px 24px; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(255,255,255,0.08); border-radius: 50%; }
  .header h1 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 900; color: white; }
  .header p { color: rgba(255,255,255,0.75); font-size: 14px; margin-top: 4px; }
  .header-emoji { font-size: 40px; display: block; margin-bottom: 8px; }

  .stats { display: flex; gap: 12px; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; text-align: center; padding: 10px; border-radius: 12px; background: var(--bg); }
  .stat-num { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .input-area { padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
  .input-row { display: flex; gap: 10px; align-items: center; }
  .main-input { flex: 1; padding: 14px 16px; border: 2px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 16px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s; }
  .main-input:focus { border-color: var(--primary); background: white; }
  .main-input::placeholder { color: var(--muted); }
  .qty-input { width: 64px; padding: 14px 10px; border: 2px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; background: var(--bg); color: var(--text); outline: none; text-align: center; transition: border-color 0.2s; }
  .qty-input:focus { border-color: var(--primary); background: white; }
  .add-btn { width: 52px; height: 52px; background: var(--primary); border: none; border-radius: 14px; color: white; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
  .add-btn:active { transform: scale(0.93); }

  .cat-select-row { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; scrollbar-width: none; }
  .cat-select-row::-webkit-scrollbar { display: none; }
  .cat-tag { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; color: var(--text); }
  .cat-tag.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 500; }

  .cats { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; background: var(--card); border-bottom: 1px solid var(--border); }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .cat-btn.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: 500; }

  .list-wrap { padding: 16px 20px; }
  .section-title { font-family: 'Fraunces', serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; margin-top: 20px; display: flex; align-items: center; gap: 8px; }
  .section-title:first-child { margin-top: 0; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--card); border-radius: var(--radius); margin-bottom: 8px; box-shadow: var(--shadow); transition: all 0.25s; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .item.done { opacity: 0.5; background: var(--bg); box-shadow: none; }
  .item.done .item-name { text-decoration: line-through; color: var(--muted); }

  .check-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 14px; }
  .item.done .check-btn { background: var(--accent); border-color: var(--accent); color: white; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .item-cat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .item-qty { background: var(--primary-light); color: var(--primary); font-weight: 600; font-size: 13px; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
  .del-btn { width: 32px; height: 32px; border: none; background: none; color: #ddd; font-size: 20px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .del-btn:active { color: var(--primary); background: var(--primary-light); }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-family: 'Fraunces', serif; font-size: 20px; color: var(--text); margin-bottom: 6px; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 20px 28px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .clear-done-btn { flex: 1; padding: 14px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; }
  .clear-all-btn { flex: 1; padding: 14px; border-radius: var(--radius); border: none; background: var(--primary); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .sync-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-right: 6px; animation: pulse 2s infinite; }
  .sync-dot.syncing { background: #ff9800; }
  .sync-dot.error { background: #f44336; animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<div class="header">
  <span class="header-emoji">🛒</span>
  <h1>Nuestra Lista</h1>
  <p><span class="sync-dot" id="sync-dot"></span><span id="sync-label">Conectando...</span></p>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-num" id="pending-count">0</div><div class="stat-label">Pendiente</div></div>
  <div class="stat"><div class="stat-num" id="done-count">0</div><div class="stat-label">Listo ✓</div></div>
</div>

<div class="input-area">
  <div class="input-row">
    <input class="main-input" id="item-input" type="text" placeholder="Añadir producto..." autocomplete="off" />
    <input class="qty-input" id="qty-input" type="text" placeholder="cant." />
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
  <div class="cat-select-row" id="cat-select"></div>
</div>

<div class="cats" id="filter-cats"></div>
<div class="list-wrap" id="list-wrap">
  <div class="empty"><div class="empty-emoji">⏳</div><h3>Cargando lista...</h3></div>
</div>

<div class="bottom-bar">
  <button class="clear-done-btn" onclick="clearDone()">Limpiar ✓</button>
  <button class="clear-all-btn" onclick="clearAll()">Vaciar lista</button>
</div>

<div class="toast" id="toast"></div>

<script>
const BIN_URL = 'https://api.jsonbin.io/v3/b/69ed65bc856a6821897219e9';
const API_KEY = '$2a$10$B4VCDn2WklEhGW5vFlkQguB.7iNHCKEjQ92xqqQwc29HHIicuIC1y';

const CATEGORIES = [
  { id: 'frutas',    name: '🍎 Frutas',    color: '#e8533a' },
  { id: 'verduras',  name: '🥦 Verduras',  color: '#2d5a3d' },
  { id: 'lacteos',   name: '🥛 Lácteos',   color: '#5b8dd9' },
  { id: 'carnes',    name: '🥩 Carnes',    color: '#c0392b' },
  { id: 'panaderia', name: '🍞 Panadería', color: '#e67e22' },
  { id: 'bebidas',   name: '🥤 Bebidas',   color: '#8e44ad' },
  { id: 'limpieza',  name: '🧹 Limpieza',  color: '#16a085' },
  { id: 'otros',     name: '📦 Otros',     color: '#7f8c8d' },
];

let items = [];
let selectedCat = 'otros';
let filterCat = 'all';
let isSaving = false;
let lastVersion = null;

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (status === 'ok')      { label.textContent = 'Compartida en tiempo real'; }
  if (status === 'syncing') { dot.classList.add('syncing'); label.textContent = 'Guardando...'; }
  if (status === 'error')   { dot.classList.add('error');   label.textContent = 'Sin conexión'; }
}

async function loadFromCloud() {
  try {
    const res = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
    const data = await res.json();
    const newVersion = data.metadata?.version;
    if (newVersion !== lastVersion) {
      lastVersion = newVersion;
      items = data.record?.items || [];
      render();
    }
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

async function saveToCloud() {
  if (isSaving) return;
  isSaving = true;
  setSyncStatus('syncing');
  try {
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ items })
    });
    const data = await res.json();
    lastVersion = data.metadata?.version;
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('⚠️ Error al guardar');
  }
  isSaving = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function addItem() {
  const input = document.getElementById('item-input');
  const qtyInput = document.getElementById('qty-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  items.unshift({ id: Date.now().toString(), name, qty: qtyInput.value.trim() || '1', cat: selectedCat, done: false });
  render();
  input.value = ''; qtyInput.value = ''; input.focus();
  showToast('✓ Añadido');
  await saveToCloud();
}

async function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.done = !item.done; render(); await saveToCloud(); }
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render(); showToast('Eliminado');
  await saveToCloud();
}

async function clearDone() {
  const count = items.filter(i => i.done).length;
  if (!count) { showToast('No hay completados'); return; }
  items = items.filter(i => !i.done);
  render(); showToast(`🗑️ ${count} eliminados`);
  await saveToCloud();
}

async function clearAll() {
  if (!items.length) { showToast('Ya está vacía'); return; }
  if (confirm('¿Vaciar toda la lista?')) {
    items = []; render(); showToast('Lista vaciada');
    await saveToCloud();
  }
}

function getCatInfo(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1]; }

function render() {
  document.getElementById('total-count').textContent = items.length;
  document.getElementById('done-count').textContent = items.filter(i => i.done).length;
  document.getElementById('pending-count').textContent = items.filter(i => !i.done).length;

  const usedCats = [...new Set(items.map(i => i.cat))];
  document.getElementById('filter-cats').innerHTML =
    `<button class="cat-btn ${filterCat==='all'?'active':''}" onclick="setFilter('all')">Todos</button>` +
    usedCats.map(cid => { const c = getCatInfo(cid); return `<button class="cat-btn ${filterCat===cid?'active':''}" onclick="setFilter('${cid}')">${c.name}</button>`; }).join('');

  const wrap = document.getElementById('list-wrap');
  const filtered = filterCat === 'all' ? items : items.filter(i => i.cat === filterCat);

  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-emoji">🛍️</div><h3>Lista vacía</h3><p>Añade el primer producto arriba</p></div>`;
    return;
  }

  const pending = filtered.filter(i => !i.done);
  const done = filtered.filter(i => i.done);
  const groups = {};
  pending.forEach(item => { if (!groups[item.cat]) groups[item.cat] = []; groups[item.cat].push(item); });

  let html = '';
  Object.keys(groups).forEach(catId => {
    const cat = getCatInfo(catId);
    html += `<div class="section-title">${cat.name}</div>`;
    groups[catId].forEach(item => { html += renderItem(item); });
  });
  if (done.length) {
    html += `<div class="section-title">✓ Completado</div>`;
    done.forEach(item => { html += renderItem(item); });
  }
  wrap.innerHTML = html;
}

function renderItem(item) {
  const cat = getCatInfo(item.cat);
  return `<div class="item ${item.done?'done':''}">
    <button class="check-btn" onclick="toggleItem('${item.id}')">${item.done?'✓':''}</button>
    <div class="item-info">
      <div class="item-name">${esc(item.name)}</div>
      <div class="item-meta"><span class="item-cat-dot" style="background:${cat.color}"></span>${cat.name.split(' ')[1]}</div>
    </div>
    <span class="item-qty">x${esc(item.qty)}</span>
    <button class="del-btn" onclick="deleteItem('${item.id}')">×</button>
  </div>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setFilter(cat) { filterCat = cat; render(); }
function buildCatSelect() {
  document.getElementById('cat-select').innerHTML = CATEGORIES.map(c =>
    `<span class="cat-tag ${c.id===selectedCat?'selected':''}" onclick="selectCat('${c.id}')">${c.name}</span>`
  ).join('');
}
function selectCat(id) { selectedCat = id; buildCatSelect(); }

document.getElementById('item-input').addEventListener('keydown', e => { if (e.key==='Enter') addItem(); });
document.getElementById('qty-input').addEventListener('keydown', e => { if (e.key==='Enter') addItem(); });

// Sync every 5 seconds
setInterval(loadFromCloud, 5000);

buildCatSelect();
loadFromCloud();
</script>
</body>
</html>
